version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: topline
      POSTGRES_USER: topline
      POSTGRES_PASSWORD: topline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: topline
      DB_USER: topline
      DB_PASSWORD: topline
      JWT_SECRET: change_me_in_dev
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:

