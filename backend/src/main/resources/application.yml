spring:
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
server:
  port: ${PORT:8080}
  shutdown: graceful
  
jwt:
  secret: ${JWT_SECRET:MySecureJWTSecretKey1234567890AbcdefghijklmnopqrstuvwxyzABCDEFGHIJ}
  expiration-ms: 86400000

# First admin account seeded on startup (see AdminBootstrap)
admin:
  email: ${ADMIN_EMAIL:}
  password: ${ADMIN_PASSWORD:}
  name: ${ADMIN_NAME:Store Admin}

# Comma-separated frontend origins allowed to call the API
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

