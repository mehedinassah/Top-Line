spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/topline}
    username: ${SPRING_DATASOURCE_USERNAME:topline}
    password: ${SPRING_DATASOURCE_PASSWORD:topline}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:MySecureJWTSecretKey1234567890AbcdefghijklmnopqrstuvwxyzABCDEFGHIJ}
  expiration-ms: 86400000

