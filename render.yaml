# Render blueprint for the Top-Line backend.
# In Render: New → Blueprint → pick this repo. It reads this file.
# Secrets (marked sync:false) are entered in the Render dashboard, not committed.
services:
  - type: web
    name: topline-api
    runtime: docker
    repo: https://github.com/mehedinassah/Top-Line
    rootDir: backend
    plan: free
    region: singapore
    healthCheckPath: /api/products
    envVars:
      - key: DB_HOST
        value: aws-1-ap-southeast-2.pooler.supabase.com
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        value: postgres.uvmqrtqjroidjiedsojg
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        value: admin@topline.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Store Admin
      - key: CORS_ALLOWED_ORIGINS
        value: https://toplinewear.vercel.app
      # Let the JVM use most of the 512 MB free instance (avoids OOM at startup)
      - key: JAVA_TOOL_OPTIONS
        value: -XX:MaxRAMPercentage=70.0
